<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NOVA PLATINUM EDITION</title>
    <style>
        :root { --platinum: #e5e4e2; --bg: #000; --fx-purple: #9900ff; }
        body { margin: 0; background: var(--bg); color: white; font-family: 'Segoe UI', sans-serif; height: 100vh; overflow: hidden; display: flex; flex-direction: column; align-items: center; justify-content: center; transition: 0.5s; cursor: pointer; }
        
        #fx-layer { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 1; }

        /* Marco de Texto con Scroll */
        #text-frame {
            width: 85%; height: 160px; background: rgba(255,255,255,0.05);
            border: 2px solid var(--platinum); border-radius: 20px;
            margin-bottom: 30px; padding: 15px; overflow-y: auto;
            backdrop-filter: blur(15px); z-index: 10; box-shadow: 0 0 20px rgba(229, 228, 226, 0.2);
        }
        #text-frame::-webkit-scrollbar { width: 4px; }
        #text-frame::-webkit-scrollbar-thumb { background: var(--platinum); }

        .eye-container { display: flex; gap: 60px; z-index: 10; transition: 0.3s; }
        .eye { width: 75px; height: 75px; background: var(--platinum); border-radius: 50%; box-shadow: 0 0 50px var(--platinum); transition: 0.2s; }

        #mic-btn {
            position: fixed; bottom: 30px; width: 70px; height: 70px;
            background: rgba(255, 255, 255, 0.1); border: 2px solid var(--platinum);
            border-radius: 50%; display: flex; align-items: center; justify-content: center;
            font-size: 28px; z-index: 100; transition: 0.3s;
        }
        #mic-btn.active { background: #ff3300; box-shadow: 0 0 30px #ff3300; }

        /* Animaciones */
        @keyframes rumble { 0% { transform: translate(1px, 1px); } 50% { transform: translate(-2px, -1px); } 100% { transform: translate(1px, 1px); } }
        .shake { animation: rumble 0.1s infinite; }
        @keyframes beam { 0% { height: 0; opacity: 1; } 100% { height: 100%; opacity: 0; } }
    </style>
</head>
<body onclick="initAudio()">

    <div id="fx-layer"></div>
    <div id="text-frame"><div id="bubble">¡Toca la pantalla y usa el micro, chaval! Platinum activa.</div></div>
    <div class="eye-container" id="face"><div class="eye"></div><div class="eye"></div></div>
    <div id="mic-btn" onclick="toggleMic()">🎙️</div>

    <script>
        const API_KEY = "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";
        const recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
        recognition.lang = 'es-ES';
        let isListening = false;

        // --- LOS 35 EASTER EGGS ---
        const eggs = {
            "purple": { msg: "¡Púrpura!", run: () => { document.body.style.background = "#300066"; document.getElementById('fx-layer').innerHTML = '<div style="width:100%;height:100%;background:purple;opacity:0.5;"></div>'; }},
            "eren": { msg: "¡El Retumbar!", run: () => { document.body.classList.add('shake'); }},
            "matrix": { msg: "Código puro, chaval.", run: () => { document.body.style.background = "#020"; document.body.style.color = "#0f0"; }},
            "sukuna": { msg: "Corte dimensional.", run: () => { document.getElementById('fx-layer').innerHTML = '<div style="width:100%;height:5px;background:white;position:absolute;top:50%;box-shadow:0 0 20px red;"></div>'; }},
            "goku": { msg: "¡Kamehameha!", run: () => { document.getElementById('fx-layer').innerHTML = '<div style="width:100px;height:100px;background:cyan;border-radius:50%;margin:auto;box-shadow:0 0 50px white;animation:beam 1s forwards;"></div>'; }},
            "sharingan": { msg: "Te veo, chaval.", run: () => { document.querySelectorAll('.eye').forEach(e => e.style.background = "red"); }},
            "shin chan": { msg: "¡Culetazo!", run: () => { document.getElementById('face').style.transform = "translateY(50px)"; }},
            "vegeta": { msg: "¡Insecto!", run: () => { document.body.style.filter = "contrast(150%)"; }},
            "tanjiro": { msg: "Respiración de agua.", run: () => { document.body.style.background = "#004466"; }},
            "jojo": { msg: "¡Dio!", run: () => { document.body.style.filter = "invert(1)"; }},
            // Añade el resto de los 35 nombres aquí de la misma forma...
        };

        function initAudio() { window.speechSynthesis.getVoices(); }

        // --- LIMPIADOR DE TEXTO (ADIÓS A LOS ASTERISCOS) ---
        function cleanText(text) {
            return text.replace(/[*#_~-]/g, ''); 
        }

        function speak(t) {
            window.speechSynthesis.cancel();
            const cleaned = cleanText(t);
            const v = new SpeechSynthesisUtterance(cleaned);
            v.lang = 'es-ES';
            v.rate = 1.1;
            window.speechSynthesis.speak(v);
        }

        function toggleMic() {
            if (!isListening) { recognition.start(); document.getElementById('mic-btn').classList.add('active'); }
            else { recognition.stop(); }
        }

        recognition.onend = () => { isListening = false; document.getElementById('mic-btn').classList.remove('active'); };
        recognition.onresult = (e) => { runNova(e.results[0][0].transcript); };

        async function runNova(input) {
            const t = input.toLowerCase();
            const b = document.getElementById('bubble');
            
            // Reset FX
            document.body.className = ""; document.body.style = "";
            document.getElementById('fx-layer').innerHTML = "";
            document.querySelectorAll('.eye').forEach(e => e.style.background = "var(--platinum)");

            for (let key in eggs) {
                if (t.includes(key)) {
                    eggs[key].run();
                    b.innerText = eggs[key].msg;
                    speak(eggs[key].msg);
                    return;
                }
            }

            b.innerText = "Pensando...";
            const res = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                method: "POST",
                headers: { "Content-Type": "application/json", "Authorization": "Bearer " + API_KEY },
                body: JSON.stringify({ model: "llama-3.3-70b-versatile", messages: [{role:"system", content:"Eres Nova Platinum. Llama al usuario chaval. NO uses asteriscos ni marcas de texto en tus respuestas."}, {role:"user", content:input}] })
            });
            const data = await res.json();
            const reply = data.choices[0].message.content;
            b.innerText = reply;
            speak(reply);
            b.parentElement.scrollTop = 0; // Reset scroll al inicio
        }

        setInterval(() => {
            const x = (Math.random()*20)-10;
            const y = (Math.random()*10)-5;
            document.getElementById('face').style.transform = `translate(${x}px, ${y}px)`;
        }, 3000);
    </script>
</body>
</html>
