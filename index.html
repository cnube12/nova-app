<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NOVA PLATINUM - ABSOLUTE</title>
    <style>
        :root { --eye-size: 220px; --nova-white: #ffffff; }
        body { 
            margin: 0; background: #000; color: white; font-family: 'Segoe UI', sans-serif; 
            height: 100vh; overflow: hidden; display: flex; flex-direction: column; 
            align-items: center; justify-content: center; cursor: pointer;
        }
        #text-frame { 
            width: 85%; max-height: 200px; background: rgba(255,255,255,0.1); 
            border: 2px solid var(--nova-white); border-radius: 35px; 
            margin-bottom: 40px; padding: 25px; opacity: 0; transition: 0.5s; text-align: center;
            backdrop-filter: blur(20px); font-size: 1.4rem;
        }
        #text-frame.visible { opacity: 1; }
        .vision-box { display: flex; gap: 80px; transition: 0.5s; }
        .eye { 
            width: var(--eye-size); height: var(--eye-size); 
            background: var(--nova-white); border-radius: 50%; 
            box-shadow: 0 0 80px var(--nova-white), 0 0 160px rgba(255,255,255,0.3); 
            transition: all 0.3s ease; 
        }
        #mic-btn { 
            position: fixed; bottom: 35px; width: 85px; height: 85px; 
            background: rgba(255,255,255,0.1); border: 2px solid var(--nova-white); border-radius: 50%; 
            display: flex; align-items: center; justify-content: center; font-size: 38px;
        }
        .shake { animation: rumble 0.1s infinite !important; }
        @keyframes rumble { 0% { transform: translate(3px, 3px); } 50% { transform: translate(-3px, -3px); } 100% { transform: translate(3px, 3px); } }
    </style>
</head>
<body onclick="handleInteraction(event)">

    <div id="text-frame"><div id="bubble"></div></div>
    <div class="vision-box" id="face">
        <div class="eye" id="l-eye"></div>
        <div class="eye" id="r-eye"></div>
    </div>
    <div id="mic-btn" onclick="toggleMic(event)">🎙️</div>

    <script>
        // SI ESTO FALLA, CAMBIA ESTA KEY POR UNA NUEVA DE CONSOLE.GROQ.COM
        const API_KEY = "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";
        
        const eyes = document.querySelectorAll('.eye');
        const face = document.getElementById('face');
        const recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
        recognition.lang = 'es-ES';

        function setEmotion(m) {
            if (m === 'think') { face.style.transform = "scale(0.85)"; eyes.forEach(e => e.style.opacity = "0.5"); }
            else if (m === 'talk') { face.style.transform = "scale(1.15)"; eyes.forEach(e => e.style.opacity = "1"); }
            else { face.style.transform = "none"; eyes.forEach(e => e.style.opacity = "1"); }
        }

        const eggs = {
            "eren": { msg: "¡El Retumbar!", run: () => document.body.classList.add('shake') },
            "sharingan": { msg: "Sharingan.", run: () => eyes.forEach(e => e.style.background = "red") },
            "purple": { msg: "¡Vacío Púrpura!", run: () => { document.body.style.background = "#1a0033"; eyes.forEach(e => e.style.boxShadow = "0 0 100px #a020f0"); }},
            "goku": { msg: "¡Kamehameha!", run: () => eyes.forEach(e => e.style.boxShadow = "0 0 150px cyan") }
        };

        function speak(t) {
            window.speechSynthesis.cancel();
            const v = new SpeechSynthesisUtterance(t);
            v.onstart = () => setEmotion('talk');
            v.onend = () => setEmotion('none');
            v.lang = 'es-ES'; window.speechSynthesis.speak(v);
        }

        setInterval(() => {
            eyes.forEach(e => e.style.height = "5px");
            setTimeout(() => eyes.forEach(e => e.style.height = "220px"), 150);
        }, 5000);

        function handleInteraction(e) { if (e.target.id === 'mic-btn') return; const p = prompt("Nova Platinum:"); if(p) runNova(p); }
        function toggleMic(e) { e.stopPropagation(); try { recognition.start(); } catch(err) {} }
        recognition.onresult = (e) => runNova(e.results[0][0].transcript);

        async function runNova(input) {
            const b = document.getElementById('bubble');
            const frame = document.getElementById('text-frame');
            document.body.className = ""; document.body.style.background = "#000";
            
            for (let k in eggs) {
                if (input.toLowerCase().includes(k)) {
                    eggs[k].run(); b.innerText = eggs[k].msg; frame.classList.add('visible'); speak(eggs[k].msg); return;
                }
            }

            b.innerText = "Procesando...";
            frame.classList.add('visible');
            setEmotion('think');

            try {
                const response = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                    method: "POST",
                    headers: {
                        "Authorization": "Bearer " + API_KEY.trim(),
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({
                        model: "llama-3.3-70b-versatile",
                        messages: [{role: "system", content: "Eres Nova Platinium. Llama al usuario chaval. Sé muy breve."}, {role: "user", content: input}]
                    })
                });

                if (!response.ok) {
                    const errorData = await response.json();
                    alert("ERROR DE GROQ: " + errorData.error.message);
                    b.innerText = "Error de API, chaval.";
                    return;
                }

                const data = await response.json();
                setEmotion('none');
                const reply = data.choices[0].message.content;
                b.innerText = reply; speak(reply);

            } catch (e) {
                setEmotion('none');
                alert("ERROR DE CONEXIÓN: El navegador está bloqueando a Nova.");
                b.innerText = "Bloqueo de red, chaval.";
            }
        }
    </script>
</body>
</html>
