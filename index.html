<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NOVA GOLDEN VERSION</title>
    <style>
        :root { --main-color: #ffd700; --bg-color: #000; }
        body { margin: 0; background: var(--bg-color); color: #fff; display: flex; flex-direction: column; justify-content: center; align-items: center; height: 100vh; overflow: hidden; font-family: 'Segoe UI', sans-serif; transition: background 1s; cursor: pointer; }
        #fx-layer { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 1; }
        .stage { position: relative; z-index: 5; display: flex; flex-direction: column; align-items: center; }
        .eye-container { display: flex; gap: 50px; transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        .eye { width: 80px; height: 80px; background: var(--main-color); border-radius: 50%; box-shadow: 0 0 40px var(--main-color); transition: all 0.3s; }
        #bubble { 
            background: rgba(255, 255, 255, 0.1); border: 2px solid var(--main-color); 
            padding: 20px; border-radius: 20px; opacity: 0; margin-bottom: 40px;
            max-width: 85%; text-align: center; backdrop-filter: blur(10px); transition: 0.5s; font-weight: bold;
        }
        .show { opacity: 1 !important; transform: translateY(-10px); }
        .orb { position: absolute; width: 60px; height: 60px; border-radius: 50%; filter: blur(15px); opacity: 0; z-index: 2; }
        @keyframes fusion { 0% { transform: scale(1); opacity: 1; } 100% { transform: scale(15); opacity: 0; } }
    </style>
</head>
<body onclick="startNova()">
    <div id="fx-layer"></div>
    <div class="stage">
        <div id="bubble">¡Toca la pantalla, chaval!</div>
        <div class="eye-container" id="face">
            <div class="eye"></div>
            <div class="eye"></div>
        </div>
    </div>
    <script>
        const API_KEY = "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";
        let activated = false;
        let history = [{role: "system", content: "Eres Nova Golden. Eres cercana y colega de Carlos. Debes llamarle 'chaval'. Si te piden 'Hollow Purple' o 'Murasaki', responde con épica anime. Eres la versión definitiva."}];

        function speak(t) {
            window.speechSynthesis.cancel();
            const v = new SpeechSynthesisUtterance(t);
            v.lang = 'es-ES';
            v.rate = 1.1;
            window.speechSynthesis.speak(v);
        }

        function startNova() {
            if(!activated) {
                activated = true;
                const b = document.getElementById('bubble');
                b.innerText = "¿Qué pasa, chaval? Soy Nova Golden. ¡Tócame otra vez para hablar!";
                b.classList.add('show');
                speak(b.innerText);
                // Ojos inquietos
                setInterval(() => {
                    const x = (Math.random() * 30) - 15;
                    const y = (Math.random() * 20) - 10;
                    document.getElementById('face').style.transform = `translate(${x}px, ${y}px)`;
                }, 2000);
            } else {
                const p = prompt("Dime algo, chaval:");
                if(p) runNova(p);
            }
        }

        function triggerPurple() {
            const layer = document.getElementById('fx-layer');
            layer.innerHTML = '<div style="width:100%; height:100%; background:#6600cc; animation: fusion 0.8s forwards;"></div>';
            speak("¡Técnica Imaginaria: Púrpura! ¡BOOM, chaval!");
            setTimeout(() => { layer.innerHTML = ''; }, 2000);
        }

        async function runNova(input) {
            if(input.toLowerCase().includes("hollow purple") || input.toLowerCase().includes("murasaki")) {
                triggerPurple();
                return;
            }
            const b = document.getElementById('bubble');
            b.innerText = "Pensando...";
            try {
                const res = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                    method: "POST",
                    headers: { "Content-Type": "application/json", "Authorization": "Bearer " + API_KEY },
                    body: JSON.stringify({ model: "llama-3.3-70b-versatile", messages: [...history, {role: "user", content: input}] })
                });
                const data = await res.json();
                const reply = data.choices[0].message.content;
                b.innerText = reply;
                speak(reply);
                history.push({role: "assistant", content: reply});
            } catch (e) {
                b.innerText = "Algo ha fallado, chaval. Mira la conexión.";
            }
        }
    </script>
</body>
</html>
