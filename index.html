<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NOVA GOLDEN - FIXED EFFECTS</title>
    <style>
        :root { --main-color: #ffd700; --bg-color: #000; --fx-blue: #0088ff; --fx-red: #ff3300; --fx-purple: #9900ff; }
        body { margin: 0; background: var(--bg-color); color: #fff; display: flex; flex-direction: column; justify-content: center; align-items: center; height: 100vh; overflow: hidden; font-family: 'Segoe UI', sans-serif; cursor: pointer; transition: 0.5s; }
        #fx-layer { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 1; overflow: hidden; }
        .stage { position: relative; z-index: 10; display: flex; flex-direction: column; align-items: center; }
        .eye-container { display: flex; gap: 50px; transition: 0.3s; }
        .eye { width: 80px; height: 80px; background: var(--main-color); border-radius: 50%; box-shadow: 0 0 40px var(--main-color); }
        #bubble { background: rgba(0, 0, 0, 0.7); border: 2px solid var(--main-color); padding: 20px; border-radius: 20px; opacity: 0; margin-bottom: 40px; max-width: 80%; text-align: center; backdrop-filter: blur(10px); transition: 0.5s; font-weight: bold; }
        .show { opacity: 1 !important; transform: translateY(-10px); }
        
        /* Animaciones */
        .orb { position: absolute; width: 100px; height: 100px; border-radius: 50%; filter: blur(20px); }
        @keyframes purple-boom { 0% { transform: scale(0); opacity: 1; } 100% { transform: scale(30); opacity: 0; } }
        @keyframes slash { 0% { transform: translateX(-100%) rotate(-45deg); } 100% { transform: translateX(100%) rotate(-45deg); } }
    </style>
</head>
<body onclick="startNova()">
    <div id="fx-layer"></div>
    <div class="stage">
        <div id="bubble">¡Toca aquí, chaval!</div>
        <div class="eye-container" id="face">
            <div class="eye"></div>
            <div class="eye"></div>
        </div>
    </div>

    <script>
        const API_KEY = "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";
        let activated = false;

        const fx = {
            "purple": {
                msg: "¡Técnica Imaginaria: Púrpura! ¡BOOM, chaval!",
                run: () => {
                    const l = document.getElementById('fx-layer');
                    l.innerHTML = `
                        <div class="orb" style="background:blue; left:10%; top:40%; transition:1s;" id="ob"></div>
                        <div class="orb" style="background:red; right:10%; top:40%; transition:1s;" id="or"></div>
                    `;
                    setTimeout(() => {
                        document.getElementById('ob').style.left = "45%";
                        document.getElementById('or').style.right = "45%";
                        setTimeout(() => {
                            l.innerHTML = '<div style="width:100%; height:100%; background:#6600cc; animation: purple-boom 0.8s forwards;"></div>';
                            document.body.style.background = "#330066";
                        }, 1000);
                    }, 100);
                }
            },
            "sukuna": {
                msg: "¡Expansión de Dominio! ¡Corte mortal, chaval!",
                run: () => {
                    const l = document.getElementById('fx-layer');
                    l.innerHTML = '<div style="position:absolute; width:20px; height:200%; background:white; top:-50%; left:50%; animation: slash 0.4s forwards; box-shadow:0 0 30px red;"></div>';
                    document.body.style.background = "#200";
                }
            },
            "matrix": {
                msg: "Entrando en la red, chaval...",
                run: () => {
                    document.body.style.background = "#030";
                    document.body.style.fontFamily = "monospace";
                }
            }
            // Agrega aquí el resto siguiendo este formato
        };

        function speak(t) {
            window.speechSynthesis.cancel();
            const v = new SpeechSynthesisUtterance(t);
            v.lang = 'es-ES';
            window.speechSynthesis.speak(v);
        }

        function startNova() {
            if(!activated) {
                activated = true;
                const b = document.getElementById('bubble');
                b.innerText = "¿Qué pasa, chaval? Prueba a decir 'PURPLE' o 'SUKUNA'.";
                b.classList.add('show');
                speak(b.innerText);
                setInterval(() => {
                    const x = (Math.random()*20)-10;
                    const y = (Math.random()*20)-10;
                    document.getElementById('face').style.transform = `translate(${x}px, ${y}px)`;
                }, 2000);
            } else {
                const p = prompt("Dime algo, chaval:");
                if(p) runNova(p);
            }
        }

        async function runNova(input) {
            const t = input.toLowerCase();
            const b = document.getElementById('bubble');
            document.body.style.background = "#000"; // Reset fondo
            document.getElementById('fx-layer').innerHTML = ''; // Reset FX

            // COMPROBAR EASTER EGGS PRIMERO
            for (let key in fx) {
                if (t.includes(key)) {
                    fx[key].run();
                    b.innerText = fx[key].msg;
                    speak(fx[key].msg);
                    return; // IMPORTANTE: Corta aquí para que la IA no hable
                }
            }

            // SI NO ES EASTER EGG, PREGUNTAR A IA
            b.innerText = "Pensando...";
            const res = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                method: "POST",
                headers: { "Content-Type": "application/json", "Authorization": "Bearer " + API_KEY },
                body: JSON.stringify({ model: "llama-3.3-70b-versatile", messages: [{role:"system", content:"Eres Nova, colega de Carlos, llámale chaval."}, {role:"user", content:input}] })
            });
            const data = await res.json();
            const reply = data.choices[0].message.content;
            b.innerText = reply;
            speak(reply);
        }
    </script>
</body>
</html>
