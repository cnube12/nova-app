<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NOVA GOLDEN VERSION</title>
    <style>
        :root { 
            --main-color: #ffd700; /* Oro para la Golden Version */
            --bg-color: #000;
        }
        body { margin: 0; background: var(--bg-color); color: #fff; display: flex; flex-direction: column; justify-content: center; align-items: center; height: 100vh; overflow: hidden; font-family: 'Segoe UI', sans-serif; transition: background 1s; }
        
        /* Escenario de Animaciones */
        #fx-layer { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 1; }
        
        .stage { position: relative; z-index: 5; display: flex; flex-direction: column; align-items: center; }
        .eye-container { display: flex; gap: 50px; transition: transform 0.2s ease; }
        .eye { width: 80px; height: 80px; background: var(--main-color); border-radius: 50%; box-shadow: 0 0 30px var(--main-color); transition: all 0.3s; }
        
        #bubble { 
            background: rgba(255, 255, 255, 0.1); border: 2px solid var(--main-color); 
            padding: 20px; border-radius: 20px; opacity: 0; margin-bottom: 40px;
            max-width: 80%; text-align: center; backdrop-filter: blur(10px); transition: 0.5s;
        }
        .show { opacity: 1 !important; transform: translateY(-10px); }

        /* Efectos Especiales */
        .orb { position: absolute; width: 50px; height: 50px; border-radius: 50%; filter: blur(10px); opacity: 0; }
        @keyframes purple-fusion {
            0% { opacity: 1; transform: scale(1); }
            50% { transform: scale(2); }
            100% { opacity: 0; transform: scale(10); }
        }
    </style>
</head>
<body>

    <div id="fx-layer"></div>
    <div class="stage">
        <div id="bubble">¿Qué pasa, chaval? ¿Listo para algo épico?</div>
        <div class="eye-container" id="face">
            <div class="eye" id="l-eye"></div>
            <div class="eye" id="r-eye"></div>
        </div>
    </div>

    <script>
        const API_KEY = "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";
        let history = [{role: "system", content: "Eres Nova Golden, la versión definitiva. Eres cercana, divertida y colega. El usuario es Carlos, pero debes llamarle 'chaval'. Eres experta en anime y tecnología. Si te piden un enlace, dalo con confianza."}];

        // 1. VOZ DE ALTA CALIDAD
        function speak(t) {
            window.speechSynthesis.cancel();
            const v = new SpeechSynthesisUtterance(t);
            const voices = window.speechSynthesis.getVoices();
            // Busca la voz de Google o Microsoft que suena más como yo
            v.voice = voices.find(voice => voice.name.includes('Google') && voice.lang.includes('es')) || voices[0];
            v.rate = 1.1; 
            v.onstart = () => document.getElementById('face').classList.add('talking');
            v.onend = () => document.getElementById('face').classList.remove('talking');
            window.speechSynthesis.speak(v);
        }

        // 2. OJOS INQUIETOS (IDLE MODE)
        setInterval(() => {
            if(!window.speechSynthesis.speaking) {
                const x = (Math.random() * 20) - 10;
                const y = (Math.random() * 20) - 10;
                document.getElementById('face').style.transform = `translate(${x}px, ${y}px)`;
            }
        }, 2000);

        // 3. ANIMACIONES SECRETAS
        function triggerFX(type) {
            const layer = document.getElementById('fx-layer');
            layer.innerHTML = '';
            
            if(type === 'purple') {
                document.body.style.background = "#2b004d";
                layer.innerHTML = `
                    <div class="orb" style="background:blue; left:30%; top:45%; opacity:1; animation: move-right 1s forwards;"></div>
                    <div class="orb" style="background:red; left:60%; top:45%; opacity:1; animation: move-left 1s forwards;"></div>
                `;
                setTimeout(() => {
                    document.body.style.background = "#6600cc";
                    speak("Técnica Imaginaria... ¡Púrpura, chaval!");
                }, 1000);
            }
        }

        async function askNova(prompt) {
            const t = prompt.toLowerCase();
            const bubble = document.getElementById('bubble');
            
            // Easter Egg: Hollow Purple
            if(t.includes("hollow purple") || t.includes("murasaki")) {
                triggerFX('purple');
                return;
            }

            bubble.innerText = "Procesando...";
            bubble.classList.add('show');

            try {
                const res = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                    method: "POST",
                    headers: { "Content-Type": "application/json", "Authorization": "Bearer " + API_KEY },
                    body: JSON.stringify({
                        model: "llama-3.3-70b-versatile",
                        messages: [...history, {role: "user", content: prompt}]
                    })
                });
                const data = await res.json();
                const reply = data.choices[0].message.content;
                bubble.innerText = reply;
                speak(reply);
                history.push({role: "assistant", content: reply});
            } catch (e) {
                bubble.innerText = "Vaya, chaval, algo ha petado.";
            }
        }
        
        // Carga voces
        window.speechSynthesis.onvoiceschanged = () => {};
    </script>
</body>
</html>
