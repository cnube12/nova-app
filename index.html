    <style>
        :root { --eye-color: #ffffff; --bg: #000; }
        body { margin: 0; background: var(--bg); color: white; font-family: 'SF Pro Display', sans-serif; height: 100vh; overflow: hidden; display: flex; flex-direction: column; align-items: center; justify-content: center; cursor: pointer; }
        #fx-layer { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 1; overflow: hidden; }
        #text-frame { width: 80%; max-height: 180px; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.3); border-radius: 20px; margin-bottom: 60px; padding: 20px; overflow-y: auto; backdrop-filter: blur(15px); z-index: 10; opacity: 0; transition: 0.6s; text-align: center; }
        #text-frame.visible { opacity: 1; }
        
        /* --- ESTA ES LA LÍNEA QUE HE CAMBIADO (Mismo código, ojos más grandes y separados) --- */
        .eye-container { display: flex; gap: 110px; z-index: 10; transition: transform 0.8s cubic-bezier(0.16, 1, 0.3, 1); }
        .eye { width: 120px; height: 120px; background: var(--eye-color); border-radius: 50%; box-shadow: 0 0 60px var(--eye-color), 0 0 20px rgba(255,255,255,0.5); transition: height 0.15s, transform 0.3s, background 0.3s; }
        /* --- FIN DEL CAMBIO --- */

        .eye.proud { transform: scale(1.15); box-shadow: 0 0 80px var(--eye-color); }
        .eye.angry { transform: scaleY(0.4); opacity: 0.8; }
        .eye.blink { height: 2px !important; }
        #mic-btn { position: fixed; bottom: 40px; width: 65px; height: 65px; background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255,255,255,0.4); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 26px; z-index: 100; transition: 0.3s; }
        #mic-btn.active { background: rgba(255,255,255,0.15); box-shadow: 0 0 25px white; }
        @keyframes rumble { 0% { transform: translate(1px, 1px); } 50% { transform: translate(-2px, -1px); } 100% { transform: translate(1px, 1px); } }
        .shake { animation: rumble 0.1s infinite; }
    </style>
</head>
