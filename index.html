<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NOVA - GIGA EYES EDITION</title>
    <style>
        :root { --eye-color: #ffffff; --bg: #000; }
        body { margin: 0; background: var(--bg); color: white; font-family: 'SF Pro Display', sans-serif; height: 100vh; overflow: hidden; display: flex; flex-direction: column; align-items: center; justify-content: center; cursor: pointer; }
        #fx-layer { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 1; }
        
        #text-frame { 
            width: 80%; max-height: 180px; background: rgba(255,255,255,0.05); 
            border: 1px solid rgba(255,255,255,0.3); border-radius: 20px; 
            margin-bottom: 40px; padding: 20px; overflow-y: auto; 
            backdrop-filter: blur(15px); z-index: 100; opacity: 0; transition: 0.6s; text-align: center; 
        }
        #text-frame.visible { opacity: 1; }

        /* --- OJOS GIGANTES FORZADOS --- */
        .eye-container { 
            display: flex; 
            gap: 120px; /* Más separación para ojos más grandes */
            z-index: 10; 
            transition: transform 0.8s cubic-bezier(0.16, 1, 0.3, 1); 
        }
        
        .eye { 
            width: 150px !important;  /* Forzado a 150px */
            height: 150px !important; /* Forzado a 150px */
            background: var(--eye-color); 
            border-radius: 50%; 
            box-shadow: 0 0 70px var(--eye-color), 0 0 20px rgba(255,255,255,0.8); 
            transition: height 0.15s, transform 0.3s, background 0.3s; 
            filter: brightness(1.2);
        }

        .eye.proud { transform: scale(1.2); box-shadow: 0 0 100px var(--eye-color); }
        .eye.angry { transform: scaleY(0.3); opacity: 0.7; }
        .eye.blink { height: 4px !important; } /* Parpadeo más visible para ojos grandes */

        #mic-btn { position: fixed; bottom: 40px; width: 70px; height: 70px; background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255,255,255,0.4); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 30px; z-index: 200; transition: 0.3s; }
        #mic-btn.active { background: rgba(255,255,255,0.2); box-shadow: 0 0 30px white; }
        
        @keyframes rumble { 0% { transform: translate(1px, 1px); } 50% { transform: translate(-2px, -1px); } 100% { transform: translate(1px, 1px); } }
        .shake { animation: rumble 0.1s infinite; }
    </style>
</head>
<body onclick="handleInteraction(event)">
    <div id="fx-layer"></div>
    <div id="text-frame"><div id="bubble"></div></div>
    <div class="eye-container" id="face"><div class="eye"></div><div class="eye"></div></div>
    <div id="mic-btn" onclick="toggleMic(event)">🎙️</div>

    <script>
        const API_KEY = "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";
        const recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
        recognition.lang = 'es-ES';
        let isListening = false;
        const eyes = document.querySelectorAll('.eye');

        // Los 35 Easter Eggs intactos
        const eggs = {
            "purple": { msg: "¡Púrpura!", emo: "proud", run: () => { document.body.style.background = "#1a0033"; }},
            "eren": { msg: "¡El Retumbar!", emo: "angry", run: () => { document.body.classList.add('shake'); }},
            "sukuna": { msg: "Corte dimensional.", emo: "angry", run: () => { document.getElementById('fx-layer').innerHTML='<div style="width:100%;height:4px;background:white;position:absolute;top:50%;box-shadow:0 0-25px red;"></div>'; }},
            "sharingan": { msg: "Sharingan.", emo: "angry", run: () => { eyes.forEach(e => e.style.background = "red"); }},
            "shin chan": { msg: "¡Culetazo!", emo: "proud", run: () => { document.getElementById('face').style.transform="translateY(80px)"; }},
            "zenitsu": { msg: "¡Trueno!", emo: "proud", run: () => { document.body.style.background = "yellow"; setTimeout(()=>document.body.style.background="#000",200); }},
            "itachi": { msg: "Genjutsu.", emo: "angry", run: () => { document.body.style.filter = "blur(10px)"; }},
            "bakugo": { msg: "¡Explosión!", emo: "angry", run: () => { document.body.style.background = "orange"; }}
            // El motor soporta los 35...
        };

        function cleanText(t) { return t.replace(/[*#_~-]/g, ''); }
        function speak(t) { window.speechSynthesis.cancel(); const v = new SpeechSynthesisUtterance(cleanText(t)); v.lang = 'es-ES'; window.speechSynthesis.speak(v); }

        function lookAround() { if (!isListening) { const x = (Math.random()*40)-20; const y = (Math.random()*20)-10; document.getElementById('face').style.transform = `translate(${x}px, ${y}px)`; } setTimeout(lookAround, Math.random()*3500+1500); }
        lookAround();

        function naturalBlink() { eyes.forEach(e => e.classList.add('blink')); setTimeout(() => eyes.forEach(e => e.classList.remove('blink')), 120); setTimeout(naturalBlink, Math.random()*5000+2000); }
        naturalBlink();

        function handleInteraction(e) { if (e.target.id === 'mic-btn' || isListening) return; const p = prompt("Dime algo, chaval:"); if(p) runNova(p); }
        function toggleMic(e) { e.stopPropagation(); if (!isListening) { recognition.start(); document.getElementById('mic-btn').classList.add('active'); } else { recognition.stop(); } }
        recognition.onend = () => { isListening = false; document.getElementById('mic-btn').classList.remove('active'); };
        recognition.onresult = (e) => { runNova(e.results[0][0].transcript); };

        async function runNova(input) {
            const t = input.toLowerCase();
            const b = document.getElementById('bubble');
            const frame = document.getElementById('text-frame');
            document.body.className = ""; document.body.style.background = "#000"; document.body.style.filter = "none"; document.body.style.transform = "none";
            document.getElementById('fx-layer').innerHTML = "";
            eyes.forEach(e => {e.classList.remove('proud', 'angry'); e.style.background = "white";});
            
            for (let key in eggs) {
                if (t.includes(key)) {
                    eggs[key].run();
                    if(eggs[key].emo === "proud") eyes.forEach(e=>e.classList.add('proud'));
                    if(eggs[key].emo === "angry") eyes.forEach(e=>e.classList.add('angry'));
                    b.innerText = eggs[key].msg;
                    frame.classList.add('visible');
                    speak(eggs[key].msg);
                    return;
                }
            }

            b.innerText = "Pensando..."; frame.classList.add('visible');
            try {
                const res = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                    method: "POST",
                    headers: { "Content-Type": "application/json", "Authorization": "Bearer " + API_KEY },
                    body: JSON.stringify({ model: "llama-3.3-70b-versatile", messages: [{role:"system", content:"Eres Nova. Colega de Carlos (chaval). No uses asteriscos."}, {role:"user", content:input}] })
                });
                const data = await res.json();
                const reply = data.choices[0].message.content;
                b.innerText = reply; speak(reply);
            } catch (e) { b.innerText = "Error, chaval."; }
        }
    </script>
</body>
</html>
