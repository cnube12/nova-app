<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NOVA PLATINUM - FINAL</title>
    <style>
        :root { --eye-size: 220px; }
        body { margin: 0; background: #000; color: white; font-family: 'SF Pro Display', sans-serif; height: 100vh; overflow: hidden; display: flex; flex-direction: column; align-items: center; justify-content: center; cursor: pointer; transition: background 0.8s, filter 0.8s; }
        
        #text-frame { 
            width: 85%; max-height: 160px; background: rgba(255,255,255,0.07); 
            border: 2px solid rgba(255,255,255,0.4); border-radius: 25px; 
            margin-bottom: 40px; padding: 25px; opacity: 0; transition: 0.5s; text-align: center; z-index: 100;
            backdrop-filter: blur(15px); font-size: 1.3rem; box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        #text-frame.visible { opacity: 1; }

        .vision-box { display: flex; gap: 90px; z-index: 10; transition: transform 0.6s cubic-bezier(0.17, 0.88, 0.32, 1.2); }
        
        .eye { 
            width: var(--eye-size) !important; height: var(--eye-size) !important; 
            background: #fff !important; border-radius: 50% !important; 
            box-shadow: 0 0 80px #fff, 0 0 140px rgba(255,255,255,0.2); 
            transition: all 0.3s cubic-bezier(0.19, 1, 0.22, 1); 
        }

        #mic-btn { position: fixed; bottom: 35px; width: 85px; height: 85px; background: rgba(255,255,255,0.1); border: 2px solid white; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 38px; z-index: 200; transition: 0.3s; }
        #mic-btn.active { background: #ff3b30; box-shadow: 0 0 40px #ff3b30; transform: scale(1.1); }
        
        @keyframes shake { 0% { transform: translate(3px, 3px); } 50% { transform: translate(-3px, -3px); } 100% { transform: translate(3px, 3px); } }
        .rumble { animation: shake 0.1s infinite !important; }
    </style>
</head>
<body onclick="handleInteraction(event)">

    <div id="text-frame"><div id="bubble"></div></div>
    
    <div class="vision-box" id="face">
        <div class="eye" id="l-eye"></div>
        <div class="eye" id="r-eye"></div>
    </div>

    <div id="mic-btn" onclick="toggleMic(event)">🎙️</div>

    <script>
        const API_KEY = "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";
        const eyes = document.querySelectorAll('.eye');
        const face = document.getElementById('face');
        const recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
        recognition.lang = 'es-ES';

        // --- MOTOR DE 35 EASTER EGGS CON ANIMACIÓN ---
        const eggs = {
            "purple": { msg: "¡Vacio Púrpura!", run: () => { document.body.style.background = "#1a0033"; eyes.forEach(e => e.style.boxShadow = "0 0 100px #a020f0"); }},
            "eren": { msg: "¡Retumbar!", run: () => { document.body.classList.add('rumble'); }},
            "sharingan": { msg: "Sharingan.", run: () => { eyes.forEach(e => e.style.background = "#ff0000"); }},
            "zenitsu": { msg: "Respiración del rayo.", run: () => { document.body.style.background = "#ffd700"; setTimeout(()=>resetStyles(), 400); }},
            "saitama": { msg: "Un puñetazo.", run: () => { eyes.forEach(e => e.style.transform = "scale(1.5)"); document.body.style.background = "#800"; }},
            "itachi": { msg: "Ya estás bajo mi genjutsu.", run: () => { document.body.style.filter = "blur(15px) grayscale(1)"; }},
            "matrix": { msg: "Entrando en la red...", run: () => { document.body.style.background = "#013220"; eyes.forEach(e => e.style.borderRadius = "5px"); }},
            "shin chan": { msg: "¡Culetazo!", run: () => { face.style.transform = "translateY(160px)"; }},
            "sukuna": { msg: "Corte dimensional.", run: () => { document.body.style.filter = "invert(1)"; }},
            "goku": { msg: "¡Ka-me-ha-me-ha!", run: () => { eyes.forEach(e => e.style.boxShadow = "0 0 150px #00fbff"); }},
            "naruto": { msg: "¡Dattebayo!", run: () => { document.body.style.background = "#ff6600"; }},
            "luffy": { msg: "¡Gear Second!", run: () => { document.body.style.filter = "saturate(3) brightness(1.2)"; }},
            "tanjiro": { msg: "Respiración de agua.", run: () => { document.body.style.background = "#004466"; }},
            "zoro": { msg: "¿Dónde estoy?", run: () => { document.body.style.transform = "rotate(10deg)"; }},
            "jojo": { msg: "¡Muda Muda Muda!", run: () => { document.body.style.filter = "contrast(2) invert(1)"; }},
            "death note": { msg: "Tu nombre ha sido escrito.", run: () => { document.body.style.filter = "grayscale(1) contrast(1.5)"; }},
            "pokemon": { msg: "¡Te elijo a ti!", run: () => { document.body.style.background = "linear-gradient(red 50%, white 50%)"; }},
            "sung jin woo": { msg: "Sube de nivel.", run: () => { eyes.forEach(e => e.style.background = "#200044"); }},
            "rimuru": { msg: "Analizando...", run: () => { eyes.forEach(e => e.style.borderRadius = "35%"); }},
            "all might": { msg: "¡Plus Ultra!", run: () => { document.body.style.background = "#0000ff"; }},
            "ken kaneki": { msg: "¿Cuánto es mil menos siete?", run: () => { eyes[0].style.background = "red"; }},
            "dr stone": { msg: "Esto es excitante.", run: () => { document.body.style.filter = "sepia(0.8)"; }},
            "mikasa": { msg: "Eres fuerte.", run: () => { document.body.style.background = "#400"; }},
            "bakugo": { msg: "¡Muere!", run: () => { document.body.style.background = "#f90"; }},
            "hisoka": { msg: "Bungee Gum.", run: () => { document.body.style.background = "#ff00ff"; }},
            "sanji": { msg: "Diable Jambe.", run: () => { eyes.forEach(e => e.style.boxShadow = "0 0 100px orange"); }},
            "inosuke": { msg: "¡Asalto porcino!", run: () => { document.body.classList.add('rumble'); }},
            "asta": { msg: "¡Todavía no!", run: () => { eyes.forEach(e => e.style.background = "#111"); }},
            "meliodas": { msg: "Full Counter.", run: () => { document.body.style.filter = "hue-rotate(180deg)"; }},
            "nezuko": { msg: "Mmh mmh!", run: () => { document.body.style.background = "pink"; }},
            "totoro": { msg: "Zzz...", run: () => { eyes.forEach(e => e.style.height = "10px"); }},
            "deku": { msg: "Detroit Smash!", run: () => { document.body.style.boxShadow = "inset 0 0 100px #0f0"; }},
            "vegeta": { msg: "Nivel de pelea... ¡Más de 8000!", run: () => { document.body.style.filter = "contrast(1.8)"; }},
            "light yagami": { msg: "Soy el Dios del nuevo mundo.", run: () => { document.body.style.background = "#200"; }},
            "one piece": { msg: "¡El tesoro existe!", run: () => { document.body.style.background = "gold"; }}
        };

        function resetStyles() {
            document.body.style = ""; document.body.className = "";
            face.style.transform = "none";
            eyes.forEach(e => { e.style = ""; e.style.background = "#fff"; });
        }

        function speak(t) {
            window.speechSynthesis.cancel();
            const v = new SpeechSynthesisUtterance(t.replace(/[*#_~-]/g, ''));
            v.lang = 'es-ES';
            window.speechSynthesis.speak(v);
        }

        // --- MOVIMIENTOS HUMANIZADOS ---
        function lookAround() {
            const x = (Math.random()*40)-20;
            const y = (Math.random()*20)-10;
            face.style.transform = `translate(${x}px, ${y}px)`;
            setTimeout(lookAround, Math.random()*3000 + 2000);
        }
        lookAround();

        function blink() {
            eyes.forEach(e => e.style.height = "4px");
            setTimeout(() => {
                eyes.forEach(e => e.style.height = "220px");
            }, 150);
            setTimeout(blink, Math.random()*6000 + 2000);
        }
        blink();

        function handleInteraction(e) {
            if (e.target.id === 'mic-btn') return;
            const p = prompt("Dime algo, chaval:");
            if(p) runNova(p);
        }

        function toggleMic(e) {
            e.stopPropagation();
            try { recognition.start(); document.getElementById('mic-btn').classList.add('active'); } catch(e) {}
        }

        recognition.onend = () => document.getElementById('mic-btn').classList.remove('active');
        recognition.onresult = (e) => runNova(e.results[0][0].transcript);

        async function runNova(input) {
            const t = input.toLowerCase();
            const b = document.getElementById('bubble');
            const frame = document.getElementById('text-frame');
            resetStyles();

            for (let key in eggs) {
                if (t.includes(key)) {
                    eggs[key].run();
                    b.innerText = eggs[key].msg;
                    frame.classList.add('visible');
                    speak(eggs[key].msg);
                    return;
                }
            }

            b.innerText = "Pensando...";
            frame.classList.add('visible');

            try {
                const res = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                    method: "POST",
                    headers: { "Content-Type": "application/json", "Authorization": "Bearer " + API_KEY },
                    body: JSON.stringify({ 
                        model: "llama-3.3-70b-versatile", 
                        messages: [{role:"system", content:"Eres Nova. Colega de Carlos (chaval). Habla de forma cercana. No uses asteriscos."}, {role:"user", content:input}] 
                    })
                });
                const data = await res.json();
                const reply = data.choices[0].message.content;
                b.innerText = reply; speak(reply);
            } catch (e) { b.innerText = "Error, chaval. ¿Internet?"; }
        }
    </script>
</body>
</html>
