<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NOVA PLATINUM - FULL EGGS</title>
    <style>
        :root { --eye-size: 220px; }
        body { margin: 0; background: #000; color: white; font-family: sans-serif; height: 100vh; overflow: hidden; display: flex; flex-direction: column; align-items: center; justify-content: center; cursor: pointer; transition: 0.5s; }
        #text-frame { width: 85%; max-height: 150px; background: rgba(255,255,255,0.08); border: 2px solid white; border-radius: 25px; margin-bottom: 30px; padding: 20px; opacity: 0; transition: 0.5s; text-align: center; z-index: 100; backdrop-filter: blur(15px); }
        #text-frame.visible { opacity: 1; }
        .vision-box { display: flex; gap: 80px; z-index: 10; transition: 0.5s cubic-bezier(0.17, 0.88, 0.32, 1.2); }
        .eye { width: var(--eye-size) !important; height: var(--eye-size) !important; background: #fff !important; border-radius: 50% !important; box-shadow: 0 0 80px #fff, 0 0 140px rgba(255,255,255,0.3); transition: all 0.2s ease; }
        #mic-btn { position: fixed; bottom: 30px; width: 80px; height: 80px; background: rgba(255,255,255,0.1); border: 2px solid white; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 35px; z-index: 200; }
        @keyframes rumble { 0% { transform: translate(2px, 2px); } 50% { transform: translate(-3px, -2px); } 100% { transform: translate(2px, 2px); } }
        .shake { animation: rumble 0.1s infinite !important; }
    </style>
</head>
<body onclick="handleInteraction(event)">
    <div id="text-frame"><div id="bubble"></div></div>
    <div class="vision-box" id="face"><div class="eye"></div><div class="eye"></div></div>
    <div id="mic-btn" onclick="toggleMic(event)">🎙️</div>

    <script>
        const API_KEY = "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";
        const eyes = document.querySelectorAll('.eye');
        const face = document.getElementById('face');
        const recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
        recognition.lang = 'es-ES';

        const eggs = {
            "purple": { msg: "¡Vacío Púrpura!", run: () => { document.body.style.background = "#1a0033"; eyes.forEach(e => e.style.boxShadow = "0 0 100px #a020f0"); }},
            "eren": { msg: "¡El Retumbar!", run: () => { document.body.classList.add('shake'); }},
            "sharingan": { msg: "Sharingan.", run: () => { eyes.forEach(e => e.style.background = "red"); }},
            "itachi": { msg: "Genjutsu.", run: () => { document.body.style.filter = "blur(15px) grayscale(1)"; }},
            "zenitsu": { msg: "¡Trueno!", run: () => { document.body.style.background = "yellow"; setTimeout(resetStyles, 300); }},
            "matrix": { msg: "Entrando en la red...", run: () => { document.body.style.background = "#020"; eyes.forEach(e => e.style.borderRadius = "10px"); }},
            "saitama": { msg: "Un puñetazo.", run: () => { eyes.forEach(e => e.style.transform = "scale(1.4)"); document.body.style.background = "#600"; }},
            "shin chan": { msg: "¡Culetazo!", run: () => { face.style.transform = "translateY(150px)"; }},
            "sukuna": { msg: "Corte dimensional.", run: () => { document.body.style.filter = "invert(1)"; }},
            "goku": { msg: "¡Kamehameha!", run: () => { eyes.forEach(e => e.style.boxShadow = "0 0 150px #00fbff"); }},
            "naruto": { msg: "¡Dattebayo!", run: () => { document.body.style.background = "#ff6600"; }},
            "luffy": { msg: "¡Gear Second!", run: () => { document.body.style.filter = "saturate(3) brightness(1.2)"; }},
            "tanjiro": { msg: "Respiración de agua.", run: () => { document.body.style.background = "#004466"; }},
            "zoro": { msg: "¿Dónde estoy?", run: () => { document.body.style.transform = "rotate(15deg)"; }},
            "jojo": { msg: "¡Muda Muda!", run: () => { document.body.style.filter = "contrast(2) invert(1)"; }},
            "death note": { msg: "Nombre escrito.", run: () => { document.body.style.filter = "grayscale(1)"; }},
            "pokemon": { msg: "¡Te elijo a ti!", run: () => { document.body.style.background = "linear-gradient(red 50%, white 50%)"; }},
            "sung jin woo": { msg: "Surge.", run: () => { eyes.forEach(e => e.style.background = "#204"); }},
            "rimuru": { msg: "Analizando...", run: () => { eyes.forEach(e => e.style.borderRadius = "35%"); }},
            "all might": { msg: "¡Plus Ultra!", run: () => { document.body.style.background = "blue"; }},
            "ken kaneki": { msg: "1000-7.", run: () => { eyes[0].style.background = "red"; }},
            "dr stone": { msg: "Excitante.", run: () => { document.body.style.filter = "sepia(0.8)"; }},
            "mikasa": { msg: "Eres fuerte.", run: () => { document.body.style.background = "#300"; }},
            "bakugo": { msg: "¡Shine!", run: () => { document.body.style.background = "orange"; }},
            "hisoka": { msg: "Bungee Gum.", run: () => { document.body.style.background = "#f0f"; }},
            "sanji": { msg: "Diable Jambe.", run: () => { eyes.forEach(e => e.style.boxShadow = "0 0 120px orange"); }},
            "inosuke": { msg: "¡Asalto!", run: () => { document.body.classList.add('shake'); }},
            "asta": { msg: "¡Antimagia!", run: () => { eyes.forEach(e => e.style.background = "#111"); }},
            "meliodas": { msg: "Counter.", run: () => { document.body.style.filter = "hue-rotate(180deg)"; }},
            "nezuko": { msg: "¡Mmh!", run: () => { document.body.style.background = "pink"; }},
            "totoro": { msg: "Zzz...", run: () => { eyes.forEach(e => e.style.height = "10px"); }},
            "deku": { msg: "Smash!", run: () => { document.body.style.boxShadow = "inset 0 0 100px green"; }},
            "vegeta": { msg: "¡Insecto!", run: () => { document.body.style.filter = "contrast(1.5)"; }},
            "light yagami": { msg: "Justicia.", run: () => { document.body.style.background = "#200"; }},
            "one piece": { msg: "¡Existe!", run: () => { document.body.style.background = "gold"; }}
        };

        function resetStyles() {
            document.body.style = ""; document.body.className = ""; face.style.transform = "none";
            eyes.forEach(e => { e.style = ""; e.style.background = "#fff"; });
        }

        function speak(t) {
            window.speechSynthesis.cancel();
            const v = new SpeechSynthesisUtterance(t.replace(/[*#_~-]/g, ''));
            v.lang = 'es-ES'; window.speechSynthesis.speak(v);
        }

        function handleInteraction(e) { if (e.target.id === 'mic-btn') return; const p = prompt("Dime algo, chaval:"); if(p) runNova(p); }
        function toggleMic(e) { e.stopPropagation(); recognition.start(); }
        recognition.onresult = (e) => runNova(e.results[0][0].transcript);

        async function runNova(input) {
            const t = input.toLowerCase(); const b = document.getElementById('bubble'); const frame = document.getElementById('text-frame');
            resetStyles();
            for (let key in eggs) {
                if (t.includes(key)) {
                    eggs[key].run(); b.innerText = eggs[key].msg; frame.classList.add('visible'); speak(eggs[key].msg); return;
                }
            }
            b.innerText = "Pensando..."; frame.classList.add('visible');
            try {
                const res = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                    method: "POST",
                    headers: { "Authorization": `Bearer ${API_KEY}`, "Content-Type": "application/json" },
                    body: JSON.stringify({ model: "llama-3.3-70b-versatile", messages: [{role:"system", content:"Eres Nova, un colega. Llama al usuario chaval."}, {role:"user", content:input}] })
                });
                const data = await res.json();
                const reply = data.choices[0].message.content;
                b.innerText = reply; speak(reply);
            } catch (e) { b.innerText = "Error, chaval."; }
        }
    </script>
</body>
</html>
