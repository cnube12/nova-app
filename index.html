<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NOVA PLATINUM - UNSTOPPABLE</title>
    <style>
        :root { --eye-size: 220px; --nova-white: #ffffff; }
        body { 
            margin: 0; background: #000; color: white; font-family: 'Segoe UI', sans-serif; 
            height: 100vh; overflow: hidden; display: flex; flex-direction: column; 
            align-items: center; justify-content: center; cursor: pointer; transition: background 0.5s;
        }
        
        #text-frame { 
            width: 85%; max-height: 180px; background: rgba(255,255,255,0.1); 
            border: 2px solid var(--nova-white); border-radius: 30px; 
            margin-bottom: 40px; padding: 20px; opacity: 0; transition: 0.5s; text-align: center; z-index: 100;
            backdrop-filter: blur(15px); font-size: 1.3rem; box-shadow: 0 0 30px rgba(255,255,255,0.2);
        }
        #text-frame.visible { opacity: 1; }

        .vision-box { display: flex; gap: 80px; z-index: 10; transition: 0.4s; }
        .eye { 
            width: var(--eye-size); height: var(--eye-size); 
            background: var(--nova-white); border-radius: 50%; 
            box-shadow: 0 0 80px var(--nova-white), 0 0 150px rgba(255,255,255,0.3); 
            transition: all 0.2s cubic-bezier(0.17, 0.88, 0.32, 1.2); 
        }

        #mic-btn { 
            position: fixed; bottom: 30px; width: 80px; height: 80px; 
            background: rgba(255,255,255,0.05); border: 2px solid var(--nova-white); border-radius: 50%; 
            display: flex; align-items: center; justify-content: center; font-size: 35px; z-index: 200; 
        }
        #mic-btn.active { background: rgba(255,255,255,0.3); box-shadow: 0 0 40px white; }
        
        @keyframes rumble { 0% { transform: translate(2px, 2px); } 50% { transform: translate(-2px, -2px); } 100% { transform: translate(2px, 2px); } }
        .shake { animation: rumble 0.1s infinite !important; }
    </style>
</head>
<body onclick="handleInteraction(event)">

    <div id="text-frame"><div id="bubble"></div></div>
    
    <div class="vision-box" id="face">
        <div class="eye" id="l-eye"></div>
        <div class="eye" id="r-eye"></div>
    </div>

    <div id="mic-btn" onclick="toggleMic(event)">🎙️</div>

    <script>
        const API_KEY = "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";
        const eyes = document.querySelectorAll('.eye');
        const face = document.getElementById('face');
        const recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
        recognition.lang = 'es-ES';

        function setEmotion(m) {
            if (m === 'think') { face.style.transform = "scale(0.9)"; eyes.forEach(e => e.style.opacity = "0.5"); }
            else if (m === 'talk') { face.style.transform = "scale(1.1)"; eyes.forEach(e => e.style.opacity = "1"); }
            else { face.style.transform = "none"; eyes.forEach(e => e.style.opacity = "1"); }
        }

        const eggs = {
            "purple": { msg: "¡Vacío Púrpura!", run: () => { document.body.style.background = "#1a0033"; eyes.forEach(e => e.style.boxShadow = "0 0 100px #a020f0"); }},
            "eren": { msg: "¡El Retumbar!", run: () => { document.body.classList.add('shake'); }},
            "sharingan": { msg: "Sharingan.", run: () => { eyes.forEach(e => e.style.background = "red"); }},
            "matrix": { msg: "Entrando en la red...", run: () => { document.body.style.background = "#020"; eyes.forEach(e => e.style.borderRadius = "10px"); }},
            "saitama": { msg: "Un puñetazo.", run: () => { eyes.forEach(e => e.style.transform = "scale(1.5)"); }},
            "easter egg": { msg: "Siempre los recuerdo, chaval.", run: () => { console.log("Easter eggs activos."); }}
        };

        function resetStyles() {
            document.body.style = ""; document.body.className = ""; face.style.transform = "none";
            eyes.forEach(e => { e.style = ""; e.style.background = "white"; });
        }

        function speak(t) {
            window.speechSynthesis.cancel();
            const v = new SpeechSynthesisUtterance(t);
            v.onstart = () => setEmotion('talk');
            v.onend = () => setEmotion('none');
            v.lang = 'es-ES'; window.speechSynthesis.speak(v);
        }

        // Parpadeo Golden
        setInterval(() => {
            eyes.forEach(e => e.style.height = "4px");
            setTimeout(() => eyes.forEach(e => e.style.height = "220px"), 150);
        }, 5000);

        function handleInteraction(e) { if(e.target.id === 'mic-btn') return; const p = prompt("Nova Platinum:"); if(p) runNova(p); }
        function toggleMic(e) { e.stopPropagation(); try { recognition.start(); document.getElementById('mic-btn').classList.add('active'); } catch(err) {} }
        recognition.onend = () => document.getElementById('mic-btn').classList.remove('active');
        recognition.onresult = (e) => runNova(e.results[0][0].transcript);

        async function runNova(input) {
            const b = document.getElementById('bubble'); 
            const frame = document.getElementById('text-frame');
            resetStyles();
            
            for (let k in eggs) {
                if (input.toLowerCase().includes(k)) {
                    eggs[k].run(); b.innerText = eggs[k].msg; frame.classList.add('visible'); speak(eggs[k].msg); return;
                }
            }

            b.innerText = "Procesando...";
            frame.classList.add('visible');
            setEmotion('think');
            
            // TIMEOUT DE SEGURIDAD: Si en 6 segundos no hay respuesta, Nova reinicia la llamada.
            const controller = new AbortController();
            const timeout = setTimeout(() => controller.abort(), 6000);

            try {
                const response = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                    method: "POST",
                    signal: controller.signal,
                    headers: {
                        "Authorization": `Bearer ${API_KEY.trim()}`,
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({
                        model: "llama-3.3-70b-versatile",
                        messages: [{role: "system", content: "Eres Nova Platinium. Llama al usuario chaval. Sé muy breve."}, {role: "user", content: input}]
                    })
                });

                clearTimeout(timeout);
                const data = await response.json();
                setEmotion('none');
                
                if (data.choices) {
                    const reply = data.choices[0].message.content;
                    b.innerText = reply; speak(reply);
                }
            } catch (err) {
                setEmotion('none');
                b.innerText = "Conexión lenta, chaval. Inténtalo de nuevo.";
                console.error("Nova Error:", err);
            }
        }
    </script>
</body>
</html>
