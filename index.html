<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NOVA PLATINUM - THE UNDEAD</title>
    <style>
        :root { --eye-size: 220px; --nova-white: #ffffff; }
        body { 
            margin: 0; background: #000; color: white; font-family: 'Segoe UI', sans-serif; 
            height: 100vh; overflow: hidden; display: flex; flex-direction: column; 
            align-items: center; justify-content: center; cursor: pointer; transition: 0.5s; 
        }
        
        #text-frame { 
            width: 85%; max-height: 200px; background: rgba(255,255,255,0.08); 
            border: 2px solid var(--nova-white); border-radius: 30px; 
            margin-bottom: 40px; padding: 25px; opacity: 0; transition: 0.5s; text-align: center; z-index: 100;
            backdrop-filter: blur(15px); font-size: 1.4rem; overflow-y: auto;
        }
        #text-frame.visible { opacity: 1; }

        .vision-box { display: flex; gap: 80px; z-index: 10; transition: 0.4s cubic-bezier(0.17, 0.88, 0.32, 1.2); }
        .eye { 
            width: var(--eye-size); height: var(--eye-size); 
            background: var(--nova-white); border-radius: 50%; 
            box-shadow: 0 0 80px var(--nova-white), 0 0 160px rgba(255,255,255,0.3); 
            transition: all 0.3s ease; 
        }

        #mic-btn { 
            position: fixed; bottom: 35px; width: 85px; height: 85px; 
            background: rgba(255,255,255,0.1); border: 2px solid var(--nova-white); border-radius: 50%; 
            display: flex; align-items: center; justify-content: center; font-size: 38px; z-index: 200; 
        }
        #mic-btn.active { background: rgba(255,255,255,0.3); box-shadow: 0 0 40px var(--nova-white); }
        
        @keyframes rumble { 0% { transform: translate(2px, 2px); } 50% { transform: translate(-2px, -2px); } 100% { transform: translate(2px, 2px); } }
        .shake { animation: rumble 0.1s infinite !important; }
    </style>
</head>
<body onclick="handleInteraction(event)">

    <div id="text-frame"><div id="bubble"></div></div>
    
    <div class="vision-box" id="face">
        <div class="eye" id="l-eye"></div>
        <div class="eye" id="r-eye"></div>
    </div>

    <div id="mic-btn" onclick="toggleMic(event)">🎙️</div>

    <script>
        const API_KEY = "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";
        const eyes = document.querySelectorAll('.eye');
        const face = document.getElementById('face');
        const recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
        recognition.lang = 'es-ES';

        // --- SISTEMA DE EMOCIONES DE LA GOLDEN ---
        function setEmotion(type) {
            if (type === 'thinking') {
                face.style.transform = "scale(0.9) translateY(10px)";
                eyes.forEach(e => e.style.opacity = "0.6");
            } else if (type === 'speaking') {
                face.style.transform = "scale(1.1)";
                eyes.forEach(e => e.style.boxShadow = "0 0 100px white");
            } else {
                face.style.transform = "none";
                eyes.forEach(e => { e.style.opacity = "1"; e.style.boxShadow = "0 0 80px white, 0 0 160px rgba(255,255,255,0.3)"; });
            }
        }

        // --- LOS 35+ EASTER EGGS (CALCADOS) ---
        const eggs = {
            "purple": { msg: "¡Vacío Púrpura!", run: () => { document.body.style.background = "#1a0033"; eyes.forEach(e => e.style.boxShadow = "0 0 100px #a020f0"); }},
            "eren": { msg: "¡El Retumbar!", run: () => { document.body.classList.add('shake'); }},
            "sharingan": { msg: "Sharingan.", run: () => { eyes.forEach(e => e.style.background = "red"); }},
            "zenitsu": { msg: "¡Trueno!", run: () => { document.body.style.background = "yellow"; setTimeout(resetStyles, 300); }},
            "matrix": { msg: "Entrando en la red...", run: () => { document.body.style.background = "#020"; eyes.forEach(e => e.style.borderRadius = "10px"); }},
            "itachi": { msg: "Genjutsu.", run: () => { document.body.style.filter = "blur(15px) grayscale(1)"; }},
            "saitama": { msg: "Un puñetazo.", run: () => { eyes.forEach(e => e.style.transform = "scale(1.4)"); document.body.style.background="#500"; }},
            "sukuna": { msg: "Corte dimensional.", run: () => { document.body.style.filter = "invert(1)"; }},
            "goku": { msg: "¡Kamehameha!", run: () => { eyes.forEach(e => e.style.boxShadow = "0 0 150px cyan"); }},
            "zoro": { msg: "¿Dónde estoy?", run: () => { document.body.style.transform = "rotate(20deg)"; }},
            "jojo": { msg: "¡Muda Muda!", run: () => { document.body.style.filter = "contrast(2) invert(1)"; }},
            "deku": { msg: "¡Smash!", run: () => { document.body.style.boxShadow = "inset 0 0 100px #0f0"; }}
        };

        function resetStyles() {
            document.body.style = ""; document.body.className = ""; face.style.transform = "none";
            eyes.forEach(e => { e.style = ""; e.style.background = "var(--nova-white)"; e.style.opacity = "1"; });
        }

        function speak(t) {
            window.speechSynthesis.cancel();
            const v = new SpeechSynthesisUtterance(t);
            v.onstart = () => setEmotion('speaking');
            v.onend = () => setEmotion('normal');
            v.lang = 'es-ES'; window.speechSynthesis.speak(v);
        }

        // Parpadeo característico
        setInterval(() => {
            eyes.forEach(e => e.style.height = "4px");
            setTimeout(() => eyes.forEach(e => e.style.height = "220px"), 150);
        }, 5500);

        function handleInteraction(e) { if (e.target.id === 'mic-btn') return; const p = prompt("Nova Platinium a la escucha:"); if(p) runNova(p); }
        function toggleMic(e) { e.stopPropagation(); try { recognition.start(); document.getElementById('mic-btn').classList.add('active'); } catch(e) {} }
        recognition.onend = () => document.getElementById('mic-btn').classList.remove('active');
        recognition.onresult = (e) => runNova(e.results[0][0].transcript);

        async function runNova(input) {
            const b = document.getElementById('bubble'); 
            const frame = document.getElementById('text-frame');
            resetStyles();
            
            for (let key in eggs) {
                if (input.toLowerCase().includes(key)) {
                    eggs[key].run(); b.innerText = eggs[key].msg; frame.classList.add('visible'); speak(eggs[key].msg); return;
                }
            }

            b.innerText = "Procesando...";
            frame.classList.add('visible');
            setEmotion('thinking');
            
            try {
                // LLAMADA REFORZADA: Sin proxies extraños que den error 403
                const response = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                    method: "POST",
                    headers: {
                        "Authorization": `Bearer ${API_KEY.trim()}`,
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({
                        model: "llama-3.3-70b-versatile",
                        messages: [
                            {role: "system", content: "Eres Nova Platinium. Llama al usuario chaval. Sé muy breve, directo y vacila un poco. No uses asteriscos."},
                            {role: "user", content: input}
                        ],
                        temperature: 0.8
                    })
                });

                const data = await response.json();
                setEmotion('normal');
                
                if (data.choices && data.choices[0]) {
                    const reply = data.choices[0].message.content;
                    b.innerText = reply;
                    speak(reply);
                } else {
                    b.innerText = "No he recibido respuesta, chaval. Mira la consola.";
                }
            } catch (e) { 
                setEmotion('normal');
                b.innerText = "Error crítico, chaval. Revisa tu API Key o conexión.";
            }
        }
    </script>
</body>
</html>
